kind = "web"
previewPath = "/"
title = "Staffy — HR-платформа для ресторанов"
version = "1.0.0"
id = "artifacts/staffy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21024

[services.development]
run = "pnpm --filter @workspace/staffy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/staffy", "run", "build" ]
publicDir = "artifacts/staffy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21024"
BASE_PATH = "/"
